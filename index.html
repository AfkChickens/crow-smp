<script>
    document.getElementById('submitBtn').addEventListener('click', () => {
        const bestellDaten = {
            minecraftName: document.getElementById('mcName').value,
            email: document.getElementById('email').value,
            pscCode: document.getElementById('pscCode').value,
            betrag: "20.00 €"
        };

        // Hier deine ngrok-Adresse eintragen (/bestellung nicht vergessen!)
        fetch('https://nongremial-dulce-unpreciously.ngrok-free.dev/bestellung', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(bestellDaten)
        })
        .then(response => response.json())
        .then(data => alert('Erfolgreich über ngrok gesendet!'))
        .catch(error => console.error(error));
    });
</script>
