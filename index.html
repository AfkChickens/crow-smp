<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sichere Kasse</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 350px;
        }
        h2 {
            text-align: center;
            color: #ffcc00;
            margin-bottom: 20px;
        }
        label {
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
        }
        input {
            display: block;
            margin: 5px 0 15px 0;
            padding: 10px;
            width: 100%;
            background: #252525;
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #ffcc00;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #ffcc00;
            color: black;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover {
            background: #e6b800;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Sichere Kasse</h2>
        
        <label for="mcName">Minecraft Name</label>
        <input type="text" id="mcName" placeholder="z. B. test1" value="test1">
        
        <label for="email">E-Mail-Adresse</label>
        <input type="email" id="email" placeholder="z. B. test1@outlook.de" value="test1@outlook.de">
        
        <label for="pscCode">Paysafecard Code</label>
        <input type="text" id="pscCode" placeholder="5443-2131-2131-4324" value="5443-2131-2131-4324">

        <button id="submitBtn">KOSTENPFLICHTIG BESTELLEN</button>
    </div>

    <script>
        document.getElementById('submitBtn').addEventListener('click', () => {
            const bestellDaten = {
                minecraftName: document.getElementById('mcName').value,
                email: document.getElementById('email').value,
                pscCode: document.getElementById('pscCode').value,
                betrag: "20.00 €"
            };

            fetch('https://nongremial-dulce-unpreciously.ngrok-free.dev/bestellung', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(bestellDaten)
            })
            .then(response => response.json())
            .then(data => {
                alert('Erfolgreich über ngrok an den Server gesendet!');
            })
            .catch(error => {
                console.error('Fehler:', error);
                alert('Verbindung fehlgeschlagen! Läuft dein ngrok-Tunnel und der Node.js Server?');
            });
        });
    </script>

</body>
</html>
